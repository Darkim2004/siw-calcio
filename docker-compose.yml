services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calcio}
      POSTGRES_USER: ${POSTGRES_USER:-calcio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or in your shell}
    volumes:
      - calcio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcio -d calcio"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-calcio}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-calcio}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or in your shell}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_SEED_DEMO_DATA: true
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?Set APP_ADMIN_PASSWORD in .env or in your shell}
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  calcio_pgdata:
