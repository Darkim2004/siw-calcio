<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referees</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: adminTopbar}"></div>

        <main class="content">
            <div class="editor-heading">
                <div class="editor-title">
                    <h1>Referees</h1>
                    <p class="meta">Admin referee management</p>
                </div>

                <div class="detail-actions">
                    <a class="add-button" th:href="@{/admin/referees/new}">Add referee</a>
                </div>
            </div>

            <section class="admin-directory">
                <div class="referee-grid" th:if="${not #lists.isEmpty(referees)}">
                    <article class="referee-card" th:each="referee : ${referees}">
                        <div class="referee-main">
                            <span class="referee-name" th:text="|${referee.firstName} ${referee.lastName}|">Referee name</span>
                            <span class="referee-code" th:text="|Code ${referee.refereeCode}|">Code 100</span>
                        </div>

                        <div class="card-actions">
                            <a class="add-button compact-button" th:href="@{/admin/referees/{id}/edit(id=${referee.id})}">Edit</a>
                            <form class="delete-form"
                                  th:action="@{/admin/referees/{id}/delete(id=${referee.id})}"
                                  method="post"
                                  onsubmit="return confirm('Delete this referee and unassign them from existing matches?');">
                                <input th:replace="~{components :: csrfInput}">
                                <button class="danger-button compact-button" type="submit">Delete</button>
                            </form>
                        </div>
                    </article>
                </div>

                <p class="empty-state" th:if="${#lists.isEmpty(referees)}">No referees are currently available.</p>
            </section>

            <div class="actions detail-actions">
                <a th:replace="~{components :: backHomeButton}"></a>
            </div>
        </main>
    </div>
</body>
</html>
