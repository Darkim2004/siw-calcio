<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${player != null ? 'Edit ' + player.firstName + ' ' + player.lastName : 'Edit player'}">Edit player</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: adminTopbar}"></div>

        <main class="card">
            <h1 th:text="${formTitle != null ? formTitle : 'Edit player'}">Edit player</h1>
            <p class="meta" th:if="${teamContext}" th:text="${team.name}">Team name</p>

            <form class="auth-form"
                  th:action="@{${formAction}}"
                  th:object="${player}"
                  method="post"
                  enctype="multipart/form-data">
                <input th:replace="~{components :: csrfInput}">

                <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}">Player error</p>
                </div>

                <div class="form-field">
                    <label for="firstName">First name</label>
                    <input id="firstName" type="text" th:field="*{firstName}" required autofocus>
                    <span class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">First name error</span>
                </div>

                <div class="form-field">
                    <label for="lastName">Last name</label>
                    <input id="lastName" type="text" th:field="*{lastName}" required>
                    <span class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Last name error</span>
                </div>

                <div class="form-field" th:if="${!teamContext}">
                    <label for="teamId">Team</label>
                    <select id="teamId" name="teamId">
                        <option value="">Free agent</option>
                        <option th:each="teamOption : ${teams}"
                                th:value="${teamOption.id}"
                                th:text="${teamOption.name}"
                                th:selected="${player.team != null and player.team.id == teamOption.id}">Team</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="birthDate">Birth date</label>
                    <input id="birthDate" type="date" th:field="*{birthDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}">Birth date error</span>
                </div>

                <div class="form-field">
                    <label for="role">Role</label>
                    <select id="role" th:field="*{role}">
                        <option value="">Select role</option>
                        <option th:each="role : ${roles}"
                                th:value="${role}"
                                th:text="${role}">FORWARD</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">Role error</span>
                </div>

                <div class="form-actions">
                    <div class="form-field score-field">
                        <label for="squadNumber">Squad number</label>
                        <input id="squadNumber" type="number" th:field="*{squadNumber}" min="0" max="99">
                        <span class="field-error" th:if="${#fields.hasErrors('squadNumber')}" th:errors="*{squadNumber}">Squad number error</span>
                    </div>

                    <div class="form-field score-field">
                        <label for="height">Height</label>
                        <input id="height" type="number" th:field="*{height}" min="0">
                        <span class="field-error" th:if="${#fields.hasErrors('height')}" th:errors="*{height}">Height error</span>
                    </div>
                </div>

                <div class="form-field form-field-wide" th:if="${!#strings.isEmpty(player.photo)}">
                    <label>Current photo</label>
                    <img class="photo-preview"
                         th:src="@{${player.photo}}"
                         th:alt="|Foto ${player.firstName} ${player.lastName}|">
                </div>

                <div class="form-field">
                    <label for="photoFile">Photo</label>
                    <input id="photoFile" type="file" name="photoFile" accept="image/png,image/jpeg,image/webp">
                    <span class="field-error" th:if="${#fields.hasErrors('photo')}" th:errors="*{photo}">Photo error</span>
                </div>

                <div class="form-actions">
                    <button class="add-button form-submit" type="submit" th:text="${submitLabel != null ? submitLabel : 'Save changes'}">Save changes</button>
                    <a class="back-button" th:href="@{${cancelUrl}}">Back</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
