<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a th:href="@{/}">
                <img class="site-logo" th:src="@{/images/SiwCalcio_logo.png}" alt="Logo sito">
            </a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="login-button" type="submit">Logout</button>
            </form>
        </div>

        <main class="content">
            <div class="editor-heading">
                <div class="editor-title">
                    <h1>Players</h1>
                    <p class="meta">Admin roster management</p>
                </div>

                <div class="detail-actions">
                    <a class="add-button" th:href="@{/admin/players/new}">Add player</a>
                </div>
            </div>

            <section class="admin-directory" th:if="${hasPlayers}">
                <details class="role-panel"
                         th:each="roleEntry : ${playersByRole}"
                         th:open="${not #lists.isEmpty(roleEntry.value)}">
                    <summary class="role-panel-summary">
                        <span th:text="${roleEntry.key}">Role</span>
                        <span class="role-count" th:text="${#lists.size(roleEntry.value)}">0</span>
                    </summary>

                    <div class="players-list admin-player-list" th:if="${not #lists.isEmpty(roleEntry.value)}">
                        <article class="player-card admin-player-card" th:each="player : ${roleEntry.value}">
                            <div class="admin-player-main">
                                <img class="player-photo"
                                     th:with="photoPath=${#strings.isEmpty(player.photo) ? '/images/Portrait_Placeholder.png' : player.photo}"
                                     th:src="@{${photoPath}}"
                                     th:alt="|Foto ${player.firstName} ${player.lastName}|">
                                <div>
                                    <span class="player-name" th:text="|${player.firstName} ${player.lastName}|">Player name</span>
                                    <span class="player-meta" th:text="${player.team != null ? player.team.name : 'Free agent'}">Team</span>
                                    <span class="player-info" th:if="${player.squadNumber > 0}" th:text="${player.squadNumber}">9</span>
                                </div>
                            </div>

                            <div class="card-actions">
                                <a class="add-button compact-button" th:href="@{/admin/players/{id}/edit(id=${player.id})}">Edit</a>
                                <form class="delete-form"
                                      th:action="@{/admin/players/{id}/delete(id=${player.id})}"
                                      method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this player?');">
                                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="danger-button compact-button" type="submit">Delete</button>
                                </form>
                            </div>
                        </article>
                    </div>

                    <p class="empty-state" th:if="${#lists.isEmpty(roleEntry.value)}">No players in this role.</p>
                </details>
            </section>

            <p class="empty-state" th:if="${!hasPlayers}">No players are currently available.</p>

            <div class="actions detail-actions">
                <a class="back-button" th:href="@{/}">Back to home page</a>
            </div>
        </main>
    </div>
</body>
</html>
