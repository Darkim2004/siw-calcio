<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${team != null ? 'Edit ' + team.name : 'Edit team'}">Edit team</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: adminTopbar}"></div>

        <main class="content team-editor">
            <div class="editor-heading">
                <div class="editor-title">
                    <h1>Edit team</h1>
                    <p class="meta" th:text="${team.name}">Team name</p>
                </div>

                <div class="detail-actions">
                    <a class="back-button" th:href="@{/teams/{id}(id=${team.id})}">View team</a>
                    <form class="delete-form"
                          th:action="@{/admin/teams/{id}/delete(id=${team.id})}"
                          method="post"
                          onsubmit="return confirm('Are you sure you want to delete this team?');">
                        <input th:replace="~{components :: csrfInput}">
                        <button class="danger-button" type="submit">Delete team</button>
                    </form>
                </div>
            </div>

            <section class="edit-section">
                <h2>Team details</h2>

                <form class="auth-form"
                      th:action="@{/admin/teams/{id}(id=${team.id})}"
                      th:object="${team}"
                      method="post">
                    <input th:replace="~{components :: csrfInput}">

                    <div class="form-grid">
                        <div class="form-field">
                            <label for="name">Name</label>
                            <input id="name" type="text" th:field="*{name}" required autofocus>
                            <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</span>
                        </div>

                        <div class="form-field">
                            <label for="city">City</label>
                            <input id="city" type="text" th:field="*{city}">
                            <span class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}">City error</span>
                        </div>

                        <div class="form-field">
                            <label for="foundationYear">Foundation year</label>
                            <input id="foundationYear" type="number" th:field="*{foundationYear}" min="1800" max="2100">
                            <span class="field-error" th:if="${#fields.hasErrors('foundationYear')}" th:errors="*{foundationYear}">Foundation year error</span>
                        </div>

                        <div class="form-field">
                            <label for="logo">Logo path</label>
                            <input id="logo" type="text" th:field="*{logo}" placeholder="/images/team-logo.png">
                            <span class="field-error" th:if="${#fields.hasErrors('logo')}" th:errors="*{logo}">Logo error</span>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="add-button form-submit" type="submit">Save changes</button>
                    </div>
                </form>
            </section>

            <section class="edit-section">
                <div class="section-heading">
                    <h2>Roster</h2>
                    <a class="add-button" th:href="@{/admin/teams/{id}/players/new(id=${team.id})}">New player</a>
                </div>

                <div class="players-list admin-player-list" th:if="${not #lists.isEmpty(teamPlayers)}">
                    <article class="player-card admin-player-card" th:each="player : ${teamPlayers}">
                        <div class="admin-player-main">
                            <img class="player-photo"
                                 th:with="photoPath=${#strings.isEmpty(player.photo) ? '/images/Portrait_Placeholder.png' : player.photo}"
                                 th:src="@{${photoPath}}"
                                 th:alt="|Foto ${player.firstName} ${player.lastName}|">
                            <div>
                                <span class="player-name" th:text="|${player.firstName} ${player.lastName}|">Player name</span>
                                <span class="player-meta" th:text="${player.role}">FORWARD</span>
                                <span class="player-info" th:if="${player.squadNumber > 0}" th:text="${player.squadNumber}">9</span>
                            </div>
                        </div>

                        <form class="delete-form"
                              th:action="@{/admin/teams/{id}/players/remove(id=${team.id})}"
                              method="post"
                              onsubmit="return confirm('Remove this player from the team roster?');">
                            <input th:replace="~{components :: csrfInput}">
                            <input type="hidden" name="playerId" th:value="${player.id}">
                            <button class="danger-button compact-button" type="submit">Remove from team</button>
                        </form>
                    </article>
                </div>

                <p class="empty-state" th:if="${#lists.isEmpty(teamPlayers)}">No players in this roster.</p>
            </section>

            <section class="edit-section">
                <h2>Add existing player</h2>

                <form class="inline-form"
                      th:if="${not #lists.isEmpty(players)}"
                      th:action="@{/admin/teams/{id}/players/add(id=${team.id})}"
                      method="post">
                    <input th:replace="~{components :: csrfInput}">

                    <div class="form-field inline-select-field">
                        <label for="playerId">Player</label>
                        <select id="playerId" name="playerId" required>
                            <option value="">Select player</option>
                            <option th:each="player : ${players}"
                                    th:value="${player.id}"
                                    th:text="${player.firstName + ' ' + player.lastName + (player.team == null ? ' - Free agent' : ' - ' + player.team.name)}">Player</option>
                        </select>
                    </div>

                    <button class="add-button form-submit" type="submit">Add to roster</button>
                </form>

                <p class="empty-state" th:if="${#lists.isEmpty(players)}">No existing players available.</p>
            </section>

            <div class="actions detail-actions">
                <a class="back-button" th:href="@{/teams}">Back to teams</a>
            </div>
        </main>
    </div>
</body>
</html>
