<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>New tournament</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="page">
		<div th:replace="~{components :: adminTopbar}"></div>

		<main class="card">
			<h1>Create a new tournament</h1>

			<form class="auth-form" th:action="@{/admin/tournaments}" th:object="${tournament}" method="post">
				<input th:replace="~{components :: csrfInput}">

				<div class="form-field">
					<label for="name">Name</label>
					<input id="name" type="text" th:field="*{name}" required autofocus>
					<span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</span>
				</div>

				<div class="form-field">
					<label for="year">Year</label>
					<input id="year" type="number" th:field="*{year}" min="1900" max="2100" required>
					<span class="field-error" th:if="${#fields.hasErrors('year')}" th:errors="*{year}">Year error</span>
				</div>

				<div class="form-field">
					<label for="description">Description</label>
					<textarea id="description" th:field="*{description}" rows="5"></textarea>
					<span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</span>
				</div>

				<div class="form-actions">
					<button class="add-button form-submit" type="submit">Create tournament</button>
					<a class="back-button" th:href="@{/tournaments}">Back to tournaments</a>
				</div>
			</form>
		</main>
	</div>
</body>
</html>
