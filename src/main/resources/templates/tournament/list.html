<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: publicTopbar}"></div>

        <main class="content">
            <h1>Tournaments</h1>

            <div class="table-wrap" th:if="${not #lists.isEmpty(tournaments)}">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Year</th>
                            <th>Description</th>
                            <th th:if="${isAdmin}" class="table-action-header">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tournament : ${tournaments}"
                            th:onclick="|window.location='@{/tournaments/{id}(id=${tournament.id})}'|">
                            <td th:text="${tournament.name}">Tournament name</td>
                            <td th:text="${tournament.year}">2026</td>
                            <td th:text="${tournament.description}">Tournament description</td>
                            <td th:if="${isAdmin}" class="table-action-cell" onclick="event.stopPropagation();">
                                <form class="delete-form"
                                      th:action="@{/admin/tournaments/{id}/delete(id=${tournament.id})}"
                                      method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this tournament?');">
                                    <input th:replace="~{components :: csrfInput}">
                                    <button class="danger-button compact-button" type="submit">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <p class="empty-state" th:if="${#lists.isEmpty(tournaments)}">No tournaments are currently available.</p>

            <div th:if="${isAdmin}"  class="actions">
                <a class="add-button" th:href="@{/admin/tournaments/new}">Add tournament</a>
            </div>
        </main>
    </div>
</body>
</html>
