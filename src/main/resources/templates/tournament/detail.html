<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${tournament != null ? tournament.name : 'Tournament detail'}">Tournament detail</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="page">
		<div class="topbar">
			<a th:href="@{/}">
				<img class="site-logo" th:src="@{/images/SiwCalcio_logo.png}" alt="Logo sito">
			</a>
			<a class="login-button" th:href="@{/login}">Login</a>
		</div>

		<main class="content" th:if="${tournament != null}">
			<h1 th:text="${tournament.name}">Tournament name</h1>
			<p class="meta"><strong>Year:</strong> <span th:text="${tournament.year}">2026</span></p>
			<p class="meta"><strong>Description:</strong> <span th:text="${tournament.description}">Tournament description</span></p>

			<h2>Teams Standings</h2>
			<div class="table-wrap" th:if="${not #lists.isEmpty(teamsWithPoints)}">
				<table>
					<thead>
						<tr>
							<th>Team</th>
							<th>Points</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="teamData : ${teamsWithPoints}"
							th:with="lastPoints=${teamsWithLastPoints != null ? teamsWithLastPoints.get(teamData[0]) : 0}"
							th:onclick="|window.location='@{/teams/{id}(id=${teamData[0].id})}'|">
							<td th:text="${teamData[0].name}">Team name</td>
							<td>
								<span class="points-total" th:text="${teamData[1]}">0</span>
								<span class="points-delta"
									  th:classappend="${lastPoints == 3 ? ' points-delta-win' : (lastPoints == 1 ? ' points-delta-draw' : ' points-delta-loss')}"
									  th:text="|+${lastPoints}|">-1</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			<p class="empty-state" th:if="${#lists.isEmpty(teamsWithPoints)}">No teams are currently registered in this tournament.</p>

			<div class="actions">
				<a class="back-button" th:href="@{/}">Back to home page</a>
			</div>
		</main>

		<main class="content" th:if="${tournament == null}">
			<h1>Tournament not found</h1>
			<div class="actions">
				<a class="back-button" th:href="@{/}">Back to home page</a>
			</div>
		</main>
	</div>
</body>
</html>
