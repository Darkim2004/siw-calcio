<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${tournament != null ? tournament.name : 'Tournament detail'}">Tournament detail</title>
	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			margin: 0;
			padding: 32px;
			background: #f4f1ea;
			color: #1f2937;
		}

		.card {
			max-width: 800px;
			margin: 0 auto;
			background: #fff;
			border-radius: 20px;
			padding: 32px;
			border: 1px solid #d8d2c4;
		}

		a {
			color: #14532d;
			text-decoration: none;
			font-weight: 700;
		}

		.meta {
			margin: 16px 0 0;
			color: #6b7280;
		}

		.table-wrap {
			overflow-x: auto;
			margin-top: 32px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		thead th {
			text-align: left;
			font-size: 0.85rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: #6b7280;
			padding: 14px 18px;
			border-bottom: 2px solid #d8d2c4;
		}

		tbody td {
			padding: 18px;
			border-bottom: 1px solid #d8d2c4;
		}

		tbody tr:hover {
			background: #f9f6ef;
		}

		.empty-state {
			padding: 20px 0 8px;
			color: #6b7280;
			margin-top: 32px;
		}
	</style>
</head>
<body>
	<main class="card" th:if="${tournament != null}">
		<h1 th:text="${tournament.name}">Tournament name</h1>
		<p class="meta"><strong>Year:</strong> <span th:text="${tournament.year}">2026</span></p>
		<p class="meta"><strong>Description:</strong> <span th:text="${tournament.description}">Tournament description</span></p>
		
				<h2>Teams Standings</h2>
				<div class="table-wrap" th:if="${not #lists.isEmpty(teamsWithPoints)}">
					<table>
						<thead>
							<tr>
								<th>Team</th>
								<th>Points</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="teamData : ${teamsWithPoints}">
								<td th:text="${teamData[0].name}">Team name</td>
								<td th:text="${teamData[1]}">0</td>
							</tr>
						</tbody>
					</table>
				</div>
				<p class="empty-state" th:if="${#lists.isEmpty(teamsWithPoints)}">No teams are currently registered in this tournament.</p>
		
		<p><a th:href="@{/}">Back to home page</a></p>
	</main>

	<main class="card" th:if="${tournament == null}">
		<h1>Tournament not found</h1>
		<p><a th:href="@{/}">Back to home page</a></p>
	</main>
</body>
</html>
