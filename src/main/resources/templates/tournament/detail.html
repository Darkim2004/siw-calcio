<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${tournament != null ? tournament.name : 'Tournament detail'}">Tournament detail</title>
	<style>
		:root {
			--bg: #f4f1ea;
			--surface: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--line: #d8d2c4;
			--accent: #14532d;
			--accent-hover: #0f3d20;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
			color: var(--text);
		}

		.page {
			min-height: 100vh;
			padding: 24px;
		}

		.topbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			margin-bottom: 48px;
		}

		.site-logo {
			height: 72px;
			width: auto;
			object-fit: contain;
		}

		.login-button,
		.back-button {
			display: inline-block;
			padding: 12px 20px;
			border-radius: 10px;
			text-decoration: none;
			font-weight: 700;
			transition: transform 0.2s ease, background-color 0.2s ease;
		}

		.login-button {
			background: var(--accent);
			color: white;
		}

		.login-button:hover,
		.back-button:hover {
			transform: translateY(-1px);
		}

		.login-button:hover {
			background: var(--accent-hover);
		}

		.content {
			max-width: 1100px;
			margin: 0 auto;
			background: rgba(255, 255, 255, 0.75);
			backdrop-filter: blur(8px);
			border: 1px solid rgba(216, 210, 196, 0.8);
			border-radius: 10px;
			padding: 32px;
			box-shadow: 0 18px 40px rgba(17, 24, 39, 0.08);
		}

		a {
			color: var(--accent);
			text-decoration: none;
			font-weight: 700;
		}

		h1 {
			margin: 0 0 22px;
			font-size: clamp(2.4rem, 4vw, 3.6rem);
			letter-spacing: 0.03em;
		}

		h2 {
			margin: 34px 0 0;
			font-size: 1.25rem;
			color: var(--accent);
		}

		.meta {
			margin: 16px 0 0;
			color: var(--muted);
		}

		.table-wrap {
			overflow-x: auto;
			margin-top: 16px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		thead th {
			text-align: left;
			font-size: 0.85rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: var(--muted);
			padding: 14px 18px;
			border-bottom: 2px solid var(--line);
		}

		tbody td {
			padding: 18px;
			border-bottom: 1px solid var(--line);
		}

		tbody tr {
			cursor: pointer;
		}

		tbody tr:hover {
			background: #f9f6ef;
		}

		.empty-state {
			padding: 20px 0 8px;
			color: var(--muted);
			margin-top: 16px;
		}

		.actions {
			margin-top: 34px;
		}

		.back-button {
			background: transparent;
			color: var(--accent);
			border: 2px solid var(--accent);
		}

		.back-button:hover {
			background: rgba(20, 83, 45, 0.08);
		}

		@media (max-width: 680px) {
			.page {
				padding: 18px;
			}

			.topbar {
				margin-bottom: 28px;
			}

			.content {
				padding: 24px;
			}
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="topbar">
			<a th:href="@{/}">
				<img class="site-logo" th:src="@{/images/SiwCalcio_logo.png}" alt="Logo sito">
			</a>
			<a class="login-button" th:href="@{/login}">Login</a>
		</div>

		<main class="content" th:if="${tournament != null}">
			<h1 th:text="${tournament.name}">Tournament name</h1>
			<p class="meta"><strong>Year:</strong> <span th:text="${tournament.year}">2026</span></p>
			<p class="meta"><strong>Description:</strong> <span th:text="${tournament.description}">Tournament description</span></p>

			<h2>Teams Standings</h2>
			<div class="table-wrap" th:if="${not #lists.isEmpty(teamsWithPoints)}">
				<table>
					<thead>
						<tr>
							<th>Team</th>
							<th>Points</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="teamData : ${teamsWithPoints}"
							th:onclick="|window.location='@{/teams/{id}(id=${teamData[0].id})}'|">
							<td th:text="${teamData[0].name}">Team name</td>
							<td th:text="${teamData[1]}">0</td>
						</tr>
					</tbody>
				</table>
			</div>
			<p class="empty-state" th:if="${#lists.isEmpty(teamsWithPoints)}">No teams are currently registered in this tournament.</p>

			<div class="actions">
				<a class="back-button" th:href="@{/}">Back to home page</a>
			</div>
		</main>

		<main class="content" th:if="${tournament == null}">
			<h1>Tournament not found</h1>
			<div class="actions">
				<a class="back-button" th:href="@{/}">Back to home page</a>
			</div>
		</main>
	</div>
</body>
</html>
