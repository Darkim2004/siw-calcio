<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nuovo torneo</title>
	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			margin: 0;
			padding: 32px;
			background: #f4f1ea;
			color: #1f2937;
		}

		.card {
			max-width: 720px;
			margin: 0 auto;
			background: #fff;
			border-radius: 20px;
			padding: 32px;
			border: 1px solid #d8d2c4;
		}

		a {
			color: #14532d;
			text-decoration: none;
			font-weight: 700;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Inserisci un nuovo torneo</h1>
		<p>Qui potrai aggiungere il form di creazione del torneo.</p>
		<p><a th:href="@{/}">Torna alla homepage</a></p>
	</main>
</body>
</html>
