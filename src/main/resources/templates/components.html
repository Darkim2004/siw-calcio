<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<body>
    <a th:fragment="siteLogo" th:href="@{/}">
        <img class="site-logo" th:src="@{/images/SiwCalcio_logo.png}" alt="Logo SIW Calcio">
    </a>

    <input th:fragment="csrfInput"
           type="hidden"
           th:if="${_csrf != null}"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">

    <a th:fragment="loginButton(buttonClass)"
       th:class="${buttonClass}"
       th:href="@{/login}"
       th:text="${userdetails == null ? 'Login' : 'Hi, ' + userdetails.username}">Login</a>

    <a th:fragment="homeButton" class="back-button" th:href="@{/}">Home</a>

    <a th:fragment="backHomeButton" class="back-button" th:href="@{/}">Back to home page</a>

    <form th:fragment="logoutForm(buttonClass)" th:action="@{/logout}" method="post">
        <input th:replace="~{components :: csrfInput}">
        <button th:class="${buttonClass}" type="submit">Logout</button>
    </form>

    <div class="topbar" th:fragment="publicTopbar">
        <a th:replace="~{components :: siteLogo}"></a>
        <a th:replace="~{components :: loginButton('login-button')}"></a>
    </div>

    <div class="topbar" th:fragment="registerTopbar">
        <a th:replace="~{components :: siteLogo}"></a>
        <a th:replace="~{components :: loginButton('back-button')}"></a>
    </div>

    <div class="topbar" th:fragment="homeTopbar">
        <a th:replace="~{components :: siteLogo}"></a>
        <a th:replace="~{components :: homeButton}"></a>
    </div>

    <div class="topbar" th:fragment="adminTopbar">
        <a th:replace="~{components :: siteLogo}"></a>
        <form th:replace="~{components :: logoutForm('login-button')}"></form>
    </div>
</body>
</html>
