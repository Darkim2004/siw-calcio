<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal server error</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: publicTopbar}"></div>

        <main class="content error-page">
            <div class="error-code">500</div>
            <h1>Internal server error</h1>
            <p class="empty-state" th:text="${errorMessage != null ? errorMessage : 'Something went wrong while loading this page.'}">
                Something went wrong while loading this page.
            </p>

            <div class="actions detail-actions">
                <a th:replace="~{components :: backHomeButton}"></a>
                <a class="add-button" th:href="@{/matches}">See matches</a>
            </div>
        </main>
    </div>
</body>
</html>
