<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad request</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a th:href="@{/}">
                <img class="site-logo" th:src="@{/images/SiwCalcio_logo.png}" alt="Logo sito">
            </a>
            <a class="login-button" th:href="@{/login}">Login</a>
        </div>

        <main class="content error-page">
            <div class="error-code">400</div>
            <h1>Bad request</h1>
            <p class="empty-state" th:text="${errorMessage != null ? errorMessage : 'The request could not be processed.'}">
                The request could not be processed.
            </p>

            <div class="actions detail-actions">
                <a class="back-button" th:href="@{/}">Back to home page</a>
                <a class="add-button" th:href="@{/matches}">See matches</a>
            </div>
        </main>
    </div>
</body>
</html>
