<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SIW Calcio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: homeTopbar}"></div>

        <main class="card auth-card">
            <section class="auth-intro">
                <span class="auth-kicker">Private area</span>
                <h1>Login</h1>
                <p class="meta">Sign in to SIW Calcio to manage tournaments, teams, and the match calendar.</p>
            </section>

            <section class="auth-panel" th:if="${userdetails == null}">
                <div class="alert alert-error" th:if="${param.error}">
                    Invalid credentials. Check your username and password.
                </div>
                <div class="alert alert-success" th:if="${param.logout}">
                    You have been logged out successfully.
                </div>

                <form class="auth-form" th:action="@{/perform-login}" method="post">
                    <input th:replace="~{components :: csrfInput}">

                    <div class="form-field">
                        <label for="username">Username</label>
                        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
                    </div>

                    <div class="form-field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>

                    <button class="login-button auth-submit" type="submit">Sign in</button>
                </form>

                <p class="auth-switch">
                    Do not have an account? <a th:href="@{/register}">Register</a>
                </p>
            </section>

            <section class="auth-panel" th:if="${userdetails != null}">
                <p class="meta">You are already signed in as <strong th:text="${userdetails.username}">user</strong>.</p>
                <div class="actions auth-actions">
                    <a class="add-button" th:href="@{/}">Go to home</a>
                    <form th:replace="~{components :: logoutForm('back-button auth-link-button')}"></form>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
