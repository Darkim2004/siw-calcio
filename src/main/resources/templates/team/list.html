<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: publicTopbar}"></div>

        <main class="content">
            <h1>Clubs</h1>

            <div class="club-grid" th:if="${not #lists.isEmpty(teams)}">
                <article class="club-card" th:each="team : ${teams}">
                    <div class="club-heading">
                        <img class="club-logo"
                             th:with="teamLogo=${#strings.isEmpty(team.logo) ? '/images/SiwCalcio_logo.png' : team.logo}"
                             th:src="@{${teamLogo}}"
                             th:alt="|Logo ${team.name}|">
                        <h2 th:text="${team.name}">Team name</h2>
                    </div>

                    <div class="club-city" th:if="${!#strings.isEmpty(team.city)}">
                        <span th:text="${team.city}">Roma</span>
                    </div>

                    <a class="club-info-button" th:href="@{/teams/{id}(id=${team.id})}">Club info</a>

                    <div class="club-card-actions" th:if="${isAdmin}">
                        <a class="add-button" th:href="@{/admin/teams/{id}/edit(id=${team.id})}">Edit</a>
                        <form class="delete-form"
                              th:action="@{/admin/teams/{id}/delete(id=${team.id})}"
                              method="post"
                              onsubmit="return confirm('Are you sure you want to delete this team?');">
                            <input th:replace="~{components :: csrfInput}">
                            <button class="danger-button" type="submit">Delete</button>
                        </form>
                    </div>
                </article>
            </div>

            <p class="empty-state" th:if="${#lists.isEmpty(teams)}">No teams are currently available.</p>

            <div class="actions detail-actions">
                <a th:replace="~{components :: backHomeButton}"></a>

                <div class="admin-actions" th:if="${isAdmin}">
                    <a class="add-button" th:href="@{/admin/teams/new}">Add team</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
