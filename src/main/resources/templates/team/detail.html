<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${team != null ? team.name : 'Squadra non trovata'}">Dettaglio squadra</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div th:replace="~{components :: publicTopbar}"></div>

        <main class="content" th:if="${team != null}">
            <section class="team-header">
                <img class="team-logo"
                     th:with="logoPath=${#strings.isEmpty(team.logo) ? '/images/SiwCalcio_logo.png' : team.logo}"
                     th:src="@{${logoPath}}"
                     th:alt="|Logo ${team.name}|">

                <div>
                    <h1 th:text="${team.name}">Team Name</h1>
                    <div class="team-meta">
                        <span class="meta-item" th:if="${!#strings.isEmpty(team.city)}">
                            <strong>City:</strong>
                            <span th:text="${team.city}">Roma</span>
                        </span>
                        <span class="meta-item" th:if="${team.foundationYear > 0}">
                            <strong>Foundation Year:</strong>
                            <span th:text="${team.foundationYear}">1927</span>
                        </span>
                    </div>
                </div>
            </section>

            <section class="roster" th:if="${playersByRole != null and !playersByRole.isEmpty()}">
                <div class="role-section" th:each="roleEntry : ${playersByRole}">
                    <h2 th:text="${roleEntry.key}">Role</h2>

                    <div class="players-list" th:if="${not #lists.isEmpty(roleEntry.value)}">
                        <article class="player-card" th:each="player : ${roleEntry.value}" th:classappend="${isAdmin} ? ' player-card-editable' : ''">
                            <div class="player-card-main">
                                <img class="player-photo"
                                     th:with="photoPath=${#strings.isEmpty(player.photo) ? '/images/Portrait_Placeholder.png' : player.photo}"
                                     th:src="@{${photoPath}}"
                                     th:alt="|Foto ${player.firstName} ${player.lastName}|">
                                <div>
                                    <span class="player-name" th:text="|${player.firstName} ${player.lastName}|">Player Name</span>
                                    <span class="player-info" th:if="${player.squadNumber > 0}" th:text="${player.squadNumber}">9</span>
                                </div>
                            </div>

                            <a class="add-button compact-button"
                               th:if="${isAdmin}"
                               th:href="@{/admin/teams/{teamId}/players/{playerId}/edit(teamId=${team.id}, playerId=${player.id})}">Edit</a>
                        </article>
                    </div>

                    <p class="empty-state" th:if="${#lists.isEmpty(roleEntry.value)}">No players in this role.</p>
                </div>
            </section>

            <p class="empty-state" th:if="${playersByRole == null or playersByRole.isEmpty()}">No players available in the roster.</p>

            <div class="actions detail-actions">
                <a th:replace="~{components :: backHomeButton}"></a>

                <div class="admin-actions" th:if="${isAdmin}">
                    <a class="add-button" th:href="@{/admin/teams/{id}/edit(id=${team.id})}">Edit team</a>
                    <form class="delete-form"
                          th:action="@{/admin/teams/{id}/delete(id=${team.id})}"
                          method="post"
                          onsubmit="return confirm('Are you sure you want to delete this team?');">
                        <input th:replace="~{components :: csrfInput}">
                        <button class="danger-button" type="submit">Delete team</button>
                    </form>
                </div>
            </div>
        </main>

        <main class="content" th:if="${team == null}">
            <h1>Team not found</h1>
            <div class="actions">
                <a th:replace="~{components :: backHomeButton}"></a>
            </div>
        </main>
    </div>
</body>
</html>
