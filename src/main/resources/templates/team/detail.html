<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${team != null ? team.name : 'Squadra non trovata'}">Dettaglio squadra</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a th:href="@{/}">
                <img class="site-logo" th:src="@{/images/SiwCalcio_logo.png}" alt="Logo sito">
            </a>
            <a class="login-button" th:href="@{/login}">Login</a>
        </div>

        <main class="content" th:if="${team != null}">
            <section class="team-header">
                <img class="team-logo"
                     th:with="logoPath=${#strings.isEmpty(team.logo) ? '/images/SiwCalcio_logo.png' : team.logo}"
                     th:src="@{${logoPath}}"
                     th:alt="|Logo ${team.name}|">

                <div>
                    <h1 th:text="${team.name}">Nome squadra</h1>
                    <div class="team-meta">
                        <span class="meta-item" th:if="${!#strings.isEmpty(team.city)}">
                            <strong>Citta:</strong>
                            <span th:text="${team.city}">Roma</span>
                        </span>
                        <span class="meta-item" th:if="${team.foundationYear > 0}">
                            <strong>Fondata:</strong>
                            <span th:text="${team.foundationYear}">1927</span>
                        </span>
                    </div>
                </div>
            </section>

            <section class="roster" th:if="${playersByRole != null and !playersByRole.isEmpty()}">
                <div class="role-section" th:each="roleEntry : ${playersByRole}">
                    <h2 th:text="${roleEntry.key}">Ruolo</h2>

                    <div class="players-list" th:if="${not #lists.isEmpty(roleEntry.value)}">
                        <article class="player-card" th:each="player : ${roleEntry.value}">
                            <img class="player-photo"
                                 th:with="photoPath=${#strings.isEmpty(player.photo) ? '/images/Portrait_Placeholder.png' : player.photo}"
                                 th:src="@{${photoPath}}"
                                 th:alt="|Foto ${player.firstName} ${player.lastName}|">
                            <div>
                                <span class="player-name" th:text="|${player.firstName} ${player.lastName}|">Nome giocatore</span>
                                <span class="player-info" th:if="${player.squadNumber > 0}" th:text="${player.squadNumber}">9</span>
                            </div>
                        </article>
                    </div>

                    <p class="empty-state" th:if="${#lists.isEmpty(roleEntry.value)}">Nessun giocatore in questa categoria.</p>
                </div>
            </section>

            <p class="empty-state" th:if="${playersByRole == null or playersByRole.isEmpty()}">Nessun giocatore presente nella rosa.</p>

            <div class="actions">
                <a class="back-button" th:href="@{/}">Torna alla home</a>
            </div>
        </main>

        <main class="content" th:if="${team == null}">
            <h1>Squadra non trovata</h1>
            <div class="actions">
                <a class="back-button" th:href="@{/}">Torna alla home</a>
            </div>
        </main>
    </div>
</body>
</html>
